seduce_vore.1011.t:0 "A Playful Exchange"
seduce_vore.1011.desc:0 "[target.GetTitledFirstName] approaches with an amused smile. 'I believe you have something of mine?' [target.GetSheHe] says, gesturing toward your belly."
seduce_vore.1011.a:0 "Return it with a wink"
seduce_vore.1011.a.tt:0 "You return [swallowed_artifact.GetName] to [target.GetFirstName]"
seduce_vore.1011.b:0 "Keep it a bit longer to tease"
seduce_vore.1011.b.tt:0 "You playfully refuse to return [swallowed_artifact.GetName] just yet"

# Event 1012 - Failure follow-up for artifact swallowing
seduce_vore.1012.t:0 "A Miscalculation"
seduce_vore.1012.desc:0 "[target.GetTitledFirstName] glares at you angrily. 'That was NOT amusing. Return my [swallowed_artifact.GetName] immediately!'"
seduce_vore.1012.a:0 "Apologize and return it"
seduce_vore.1012.a.tt:0 "You quickly return [swallowed_artifact.GetName] and apologize"
seduce_vore.1012.b:0 "Double down on the tease"
seduce_vore.1012.b.tt:0 "You refuse to back down, asserting dominance"

# Event 1000 - A Tight Embrace (Milestone 2)
seduce_vore.1000.a:0 "Accept the embrace"
seduce_vore.1000.b:0 "This is too much..."

# Event 1001 - Safe Resting (Milestone 2)
seduce_vore.1001.a:0 "Offer them rest inside you"
seduce_vore.1001.a.tt:0 "You will attempt to hold [target.GetFirstName] safely inside you"
seduce_vore.1001.b:0 "Don't risk it"

# Event 1002 - Success for Safe Resting
seduce_vore.1002.desc:0 "[target.GetTitledFirstName] emerges from within you, looking peaceful and content. 'That was... surprisingly comforting,' [target.GetSheHe] admits with a soft smile."
seduce_vore.1002.a:0 "I'm glad you felt safe"

# Event 1003 - Failure for Safe Resting
seduce_vore.1003.desc:0 "[target.GetTitledFirstName] pulls away quickly, looking uncomfortable. 'I... I cannot do this. Forgive me, but this is too strange.'"
seduce_vore.1003.a:0 "Perhaps it was too soon"

# Tooltips for other wager events
seduce_vore.1081.a.tt:0 "Accept the wager and play the game"
seduce_vore.1082.a.tt:0 "[target.GetFirstName] must honor the bet"
seduce_vore.1082.b.tt:0 "You must let [target.GetFirstName] choose their prize"

# Tooltips for possessive display
seduce_vore.1050.a.tt:0 "Assert your dominance over [rival.GetFirstName]"


