 # Event 0001 - Player as Predator
 battle_vore.0001.t:0 "Spoils of War"
 battle_vore.0001.desc:0 "The battle is won. [prey.GetTitledFirstName] lies defeated before you, exhausted and vulnerable. You could end this here and now... or show mercy."
 battle_vore.0001.a:0 "Capture [prey.GetHerHim] alive"
 battle_vore.0001.b:0 "End [prey.GetHerHis] life"
 
 # Event 0002 - Player as Prey
 battle_vore.0002.t:0 "Defeated"
 battle_vore.0002.desc:0 "You fought valiantly, but it was not enough. [predator.GetTitledFirstName] stands over you, victorious. There is a hungry gleam in [predator.GetHerHis] eyes as [predator.GetSheHe] approaches..."
 battle_vore.0002.a:0 "Accept your fate"
 battle_vore.0002.a.tt:0 "You are at [predator.GetFirstNamePossessive] mercy"
 battle_vore.0002.b:0 "Struggle against [predator.GetHerHim]!"
 battle_vore.0002.b.tt:0 "It won't change the outcome, but you'll go down fighting"

